<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contas - FinWeb</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #020617;
      --card:   #0f172a;
      --border: #1e293b;
      --text:   #e2e8f0;
      --muted:  #94a3b8;
      --green:  #22c55e;
      --cyan:   #06b6d4;
      --danger: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    body { display: flex; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* SIDEBAR */
    .sidebar {
      width: 220px; height: 100vh; position: sticky; top: 0;
      background: var(--card); border-right: 1px solid var(--border);
      padding: 24px 16px; display: flex; flex-direction: column;
    }
    .logo { font-size: 20px; font-weight: 600; margin-bottom: 32px; padding: 0 8px; }
    .logo span { color: var(--green); }
    .menu { flex: 1; }
    .menu a {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; margin-bottom: 4px; border-radius: 8px;
      text-decoration: none; color: var(--muted); font-size: 14px;
      transition: all 0.15s; cursor: pointer;
    }
    .menu a:hover, .menu a.active { background: rgba(34,197,94,0.1); color: var(--green); }
    .menu a.danger:hover { background: rgba(239,68,68,0.1); color: var(--danger); }
    .menu-divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

/* Estilos da Sidebar */
    .menu-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      padding: 12px 12px 6px;
      font-weight: 600;
      opacity: 0.7;
      display: block; /* Garante que fique em uma linha própria */
    }

    .menu-divider {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 10px 12px;
      opacity: 0.5;
    }

    /* MAIN */
    .main { flex: 1; padding: 28px 32px; overflow-y: auto; }

    .page-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;
    }
    .page-header h2 { font-size: 20px; font-weight: 600; }

    /* BOTÃO */
    .btn {
      padding: 9px 18px; border-radius: 8px; border: none;
      font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: linear-gradient(90deg, var(--green), var(--cyan)); color: white; }
    .btn-danger  { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
    .btn-ghost   { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* RESUMO */
    .stats {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
      gap: 16px; margin-bottom: 28px;
    }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px;
    }
    .stat-card h3 { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .stat-card .value { font-size: 22px; font-weight: 600; }
    .stat-card .value.green  { color: var(--green); }
    .stat-card .value.cyan   { color: var(--cyan); }

    /* TABELA */
    .table-wrap {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .table-header {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .table-header span { font-size: 14px; font-weight: 500; }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 12px 20px; text-align: left;
      font-size: 11px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    tbody td { padding: 14px 20px; font-size: 14px; }

    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 500;
    }
    .badge-checking    { background: rgba(6,182,212,0.15);  color: var(--cyan); }
    .badge-savings     { background: rgba(34,197,94,0.15);  color: var(--green); }
    .badge-investment  { background: rgba(168,85,247,0.15); color: #a855f7; }
    .badge-active      { background: rgba(34,197,94,0.12);  color: var(--green); }
    .badge-inactive    { background: rgba(239,68,68,0.12);  color: var(--danger); }

    .actions { display: flex; gap: 8px; }

    .empty {
      text-align: center; padding: 48px 20px; color: var(--muted); font-size: 14px;
    }
    .empty .icon { font-size: 36px; margin-bottom: 12px; }

    /* MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px; width: 100%; max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
    .form-group input,
    .form-group select {
      width: 100%; padding: 10px 12px;
      border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text);
      font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus { border-color: var(--green); }
    .form-group select option { background: var(--card); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 18px;
      font-size: 13px; z-index: 200;
      transform: translateY(80px); opacity: 0;
      transition: all 0.3s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error   { border-color: var(--danger); color: var(--danger); }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">Fin<span>Web</span></div>

  <nav class="menu">
    <div class="menu-label">Movimentações</div>
    <a href="/public/dashboard.html">📊 Dashboard</a>
    <a href="/public/transactions.html">💸 Transações</a>
    <a href="/public/cards.html">💳 Cartões</a>
    
    <hr class="menu-divider">

    <div class="menu-label">Demonstrativos</div>
    <a href="/public/reports.html">📈 Relatórios</a>
    <a href="#">🌊 Fluxo de Caixa</a>
    
    <hr class="menu-divider">

    <div class="menu-label">Cadastro</div>
    <a href="/public/accounts.html">🏦 Contas</a>
    <a href="/public/categories.html">🏷️ Categorias</a>
    <a href="/public/cost_centers.html">🏢 Centro de Custos</a>
    <a href="/public/Tags.html">🏷️ Tags</a>

    <hr class="menu-divider">
    <a onclick="logout()" class="danger" style="cursor:pointer">🚪 Sair</a>
  </nav>
</div>

<!-- MAIN -->
<div class="main">
  <div class="page-header">
    <h2>🏦 Contas</h2>
    <button class="btn btn-primary" onclick="openModal()">+ Nova Conta</button>
  </div>

  <!-- RESUMO -->
  <div class="stats">
    <div class="stat-card">
      <h3>Saldo Total</h3>
      <div class="value green" id="totalBalance">—</div>
    </div>
    <div class="stat-card">
      <h3>Contas Ativas</h3>
      <div class="value cyan" id="totalAccounts">—</div>
    </div>
    <div class="stat-card">
      <h3>Corrente</h3>
      <div class="value green" id="checkingBalance">—</div>
    </div>
    <div class="stat-card">
      <h3>Poupança</h3>
      <div class="value cyan" id="savingsBalance">—</div>
    </div>
  </div>

  <!-- TABELA -->
  <div class="table-wrap">
    <div class="table-header">
      <span>Suas Contas</span>
    </div>
    <div id="tableContent">
      <div class="empty"><div class="icon">⏳</div>Carregando...</div>
    </div>
  </div>
</div>

<!-- MODAL CRIAR/EDITAR -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Nova Conta</h3>

    <div class="form-group">
      <label>Nome da Conta *</label>
      <input type="text" id="fName" placeholder="Ex: Nubank, Bradesco...">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Tipo *</label>
        <select id="fType">
          <option value="checking">Corrente</option>
          <option value="savings">Poupança</option>
          <option value="investment">Investimento</option>
        </select>
      </div>
      <div class="form-group">
        <label>Saldo Inicial</label>
        <input type="number" id="fBalance" placeholder="0,00" step="0.01" min="0">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Banco</label>
        <input type="text" id="fBank" placeholder="Ex: Nubank">
      </div>
      <div class="form-group">
        <label>Número da Conta</label>
        <input type="text" id="fNumber" placeholder="Ex: 12345-6">
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="btnSave" onclick="saveAccount()">Salvar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script type="module">
  import { initSupabase, getCurrentUser, db } from '../src/js/utils/db.js';
  import { logoutUser } from '../src/js/modules/auth.js';
  import { format } from '../src/js/utils/format.js';
 
  let currentUser = null;
  let editingId   = null;

  // ── Helpers ──────────────────────────────────────
  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast ${type} show`;
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  function typeLabel(t) {
    return { checking: 'Corrente', savings: 'Poupança', investment: 'Investimento' }[t] || t;
  }
  function typeBadge(t) {
    return { checking: 'badge-checking', savings: 'badge-savings', investment: 'badge-investment' }[t] || '';
  }

  // ── Render ────────────────────────────────────────
  function renderTable(accounts) {
    const wrap = document.getElementById('tableContent');

    if (!accounts.length) {
      wrap.innerHTML = `<div class="empty"><div class="icon">🏦</div>Nenhuma conta cadastrada. Crie sua primeira conta!</div>`;
      return;
    }

    wrap.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Tipo</th>
            <th>Banco</th>
            <th>Nº Conta</th>
            <th>Saldo</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          ${accounts.map(a => `
            <tr>
              <td>${a.name}</td>
              <td><span class="badge ${typeBadge(a.account_type)}">${typeLabel(a.account_type)}</span></td>
              <td>${a.bank_name || '—'}</td>
              <td>${a.account_number || '—'}</td>
              <td style="font-weight:600; color:${a.current_balance >= 0 ? 'var(--green)' : 'var(--danger)'}">
                ${format.money(a.current_balance || 0)}
              </td>
              <td><span class="badge ${a.is_active ? 'badge-active' : 'badge-inactive'}">${a.is_active ? 'Ativa' : 'Inativa'}</span></td>
              <td>
                <div class="actions">
                  <button class="btn btn-ghost" onclick="editAccount('${a.id}')">✏️</button>
                  <button class="btn btn-danger" onclick="deleteAccount('${a.id}', '${a.name}')">🗑️</button>
                </div>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }

  function updateStats(accounts) {
    const active    = accounts.filter(a => a.is_active);
    const total     = active.reduce((s, a) => s + (a.current_balance || 0), 0);
    const checking  = active.filter(a => a.account_type === 'checking').reduce((s, a) => s + (a.current_balance || 0), 0);
    const savings   = active.filter(a => a.account_type === 'savings').reduce((s, a) => s + (a.current_balance || 0), 0);

    document.getElementById('totalBalance').textContent   = format.money(total);
    document.getElementById('totalAccounts').textContent  = active.length;
    document.getElementById('checkingBalance').textContent = format.money(checking);
    document.getElementById('savingsBalance').textContent  = format.money(savings);
  }

  // ── Load ──────────────────────────────────────────
  async function loadAccounts() {
    const accounts = await db.select('accounts', {
      eq: { user_id: currentUser.id },
      order: { column: 'created_at', asc: false }
    });
    renderTable(accounts);
    updateStats(accounts);
    return accounts;
  }

  // ── Modal ─────────────────────────────────────────
  window.openModal = (account = null) => {
    editingId = account ? account.id : null;
    document.getElementById('modalTitle').textContent = account ? 'Editar Conta' : 'Nova Conta';
    document.getElementById('fName').value    = account?.name || '';
    document.getElementById('fType').value    = account?.account_type || 'checking';
    document.getElementById('fBalance').value = account?.initial_balance || '';
    document.getElementById('fBank').value    = account?.bank_name || '';
    document.getElementById('fNumber').value  = account?.account_number || '';
    document.getElementById('modalOverlay').classList.add('open');
  };

  window.closeModal = () => {
    document.getElementById('modalOverlay').classList.remove('open');
    editingId = null;
  };

  // Fechar clicando fora
  document.getElementById('modalOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });

  // ── Save ──────────────────────────────────────────
  window.saveAccount = async () => {
    const name    = document.getElementById('fName').value.trim();
    const type    = document.getElementById('fType').value;
    const balance = parseFloat(document.getElementById('fBalance').value) || 0;
    const bank    = document.getElementById('fBank').value.trim();
    const number  = document.getElementById('fNumber').value.trim();

    if (!name) return toast('❌ Informe o nome da conta.', 'error');

    const btn = document.getElementById('btnSave');
    btn.disabled = true;

    try {
      const payload = {
        name,
        account_type:    type,
        initial_balance: balance,
        current_balance: balance,
        bank_name:       bank || null,
        account_number:  number || null,
        user_id:         currentUser.id
      };

      if (editingId) {
        await db.update('accounts', {
          name,
          account_type:   type,
          bank_name:      bank || null,
          account_number: number || null
        }, editingId);
        toast('✅ Conta atualizada!');
      } else {
        await db.insert('accounts', payload);
        toast('✅ Conta criada!');
      }

      closeModal();
      await loadAccounts();
    } catch (err) {
      toast('❌ ' + err.message, 'error');
    } finally {
      btn.disabled = false;
    }
  };

  // ── Edit ──────────────────────────────────────────
  window.editAccount = async (id) => {
    const accounts = await db.select('accounts', { eq: { user_id: currentUser.id } });
    const account  = accounts.find(a => a.id === id);
    if (account) openModal(account);
  };

  // ── Delete ────────────────────────────────────────
  window.deleteAccount = async (id, name) => {
    if (!confirm(`Deseja excluir a conta "${name}"? Esta ação não pode ser desfeita.`)) return;

    try {
      await db.delete('accounts', id);
      toast('✅ Conta excluída.');
      await loadAccounts();
    } catch (err) {
      toast('❌ ' + err.message, 'error');
    }
  };

  // ── Logout ────────────────────────────────────────
  window.logout = async () => {
    try { await logoutUser(); } catch (e) { alert(e.message); }
  };

  // ── Init ──────────────────────────────────────────
  (async () => {
    try {
      initSupabase();
      currentUser = await getCurrentUser();

      if (!currentUser) {
        window.location.href = '/public/login.html';
        return;
      }

      await loadAccounts();
    } catch (err) {
      console.error('❌', err);
      alert(err.message);
    }
  })();
</script>
</body>
</html>
