<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centros de Custo - FinWeb</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #020617;
      --card:   #0f172a;
      --border: #1e293b;
      --text:   #e2e8f0;
      --muted:  #94a3b8;
      --green:  #22c55e;
      --cyan:   #06b6d4;
      --danger: #ef4444;
    }
    
    .badge-personal { background: rgba(34, 197, 94, 0.1); color: var(--green); }
    .badge-business { background: rgba(168, 85, 247, 0.1); color: #a855f7; }
    .badge-project  { background: rgba(6, 182, 212, 0.1); color: var(--cyan); }
    
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { display: flex; background: var(--bg); color: var(--text); min-height: 100vh; }
    
    /* SIDEBAR */
    .sidebar { width: 220px; height: 100vh; position: sticky; top: 0; background: var(--card); border-right: 1px solid var(--border); padding: 24px 16px; display: flex; flex-direction: column; }
    .logo { font-size: 20px; font-weight: 600; margin-bottom: 32px; padding: 0 8px; }
    .logo span { color: var(--green); }
    .menu { flex: 1; }
    .menu a { display: flex; align-items: center; gap: 10px; padding: 10px 12px; margin-bottom: 4px; border-radius: 8px; text-decoration: none; color: var(--muted); font-size: 14px; transition: all 0.15s; cursor: pointer; }
    .menu a:hover, .menu a.active { background: rgba(34,197,94,0.1); color: var(--green); }
    .menu a.danger:hover { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
    
    .menu-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); padding: 12px 12px 6px; font-weight: 600; opacity: 0.7; display: block; }
    .menu-divider { border: 0; border-top: 1px solid var(--border); margin: 10px 12px; opacity: 0.5; }
    
    /* MAIN */
    .main { flex: 1; padding: 28px 32px; overflow-y: auto; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    
    .btn { padding: 9px 18px; border-radius: 8px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; }
    .btn-primary { background: linear-gradient(90deg, var(--green), var(--cyan)); color: white; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }

    .cost-centers-list { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .list-header { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 120px; padding: 14px 20px; background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; color: var(--muted); }
    .row-item { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 120px; align-items: center; padding: 12px 20px; border-bottom: 1px solid var(--border); }
    
    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 100%; max-width: 480px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="logo">Fin<span>Web</span></div>

  <nav class="menu">
    <div class="menu-label">Movimentações</div>
    <a href="/public/dashboard.html">📊 Dashboard</a>
    <a href="/public/transactions.html">💸 Transações</a>
    <a href="/public/cards.html">💳 Cartões</a>
    
    <hr class="menu-divider">

    <div class="menu-label">Demonstrativos</div>
    <a href="/public/reports.html">📈 Relatórios</a>
    <a href="#">🌊 Fluxo de Caixa</a>
    
    <hr class="menu-divider">

    <div class="menu-label">Cadastro</div>
    <a href="/public/accounts.html">🏦 Contas</a>
    <a href="/public/categories.html">🏷️ Categorias</a>
    <a href="/public/cost_centers.html" class="active">🏢 Centro de Custos</a>
    <a href="/public/tags.html">🏷️ Tags</a>

    <hr class="menu-divider">
    <!-- CORREÇÃO DO BOTÃO SAIR[cite: 1, 4] -->
    <a onclick="logout()" class="danger" style="cursor:pointer">🚪 Sair</a>
  </nav>
</div>

<div class="main">
  <div class="page-header">
    <h2>🏢 Centros de Custo</h2>
    <button class="btn btn-primary" onclick="openModal()">+ Novo Centro</button>
  </div>

  <div class="cost-centers-list">
    <div class="list-header">
      <div>Nome / Código</div>
      <div>Tipo</div>
      <div>Status</div>
      <div>Descrição</div>
      <div style="text-align: right;">Ações</div>
    </div>
    <div id="listBody">
      <div class="empty" style="padding: 40px; text-align: center; color: var(--muted);">Carregando...</div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle">Novo Centro de Custo</h3>
    <br>
    <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <div class="form-group">
            <label>Código</label>
            <input type="text" id="fCode" placeholder="Ex: 100.01">
        </div>
        <div class="form-group">
            <label>Tipo *</label>
            <select id="fType">
              <option value="personal">Pessoal</option>
              <option value="business">Negócio</option>
              <option value="project">Projeto</option>
              <option value="family">Família</option>
              <option value="other">Outro</option>
            </select>
        </div>
    </div>
    <div class="form-group">
      <label>Nome *</label>
      <input type="text" id="fName">
    </div>
    <div class="form-group">
        <label>Descrição</label>
        <textarea id="fDescription" rows="2"></textarea>
    </div>
    <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <div class="form-group">
            <label>Status</label>
            <select id="fActive">
              <option value="true">Ativo</option>
              <option value="false">Inativo</option>
            </select>
        </div>
        <div class="form-group">
            <label>Cor</label>
            <input type="color" id="fColor" value="#06b6d4" style="height: 40px;">
        </div>
    </div>
    <div class="modal-actions" style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="btnSave" onclick="saveCostCenter()">Salvar</button>
    </div>
  </div>
</div>

<script type="module">
  import { initSupabase, getCurrentUser, db } from '../src/js/utils/db.js';
  import { logoutUser } from '../src/js/modules/auth.js'; // IMPORTAÇÃO DO LOGOUT[cite: 1]

  let currentUser = null;
  let items = [];
  let editingId = null;

  // FUNÇÃO GLOBAL DE LOGOUT[cite: 1]
  window.logout = async () => {
    try { 
      await logoutUser(); 
    } catch (e) { 
      alert("Erro ao sair: " + e.message); 
    }
  };

  async function loadData() {
    try {
      items = await db.select('cost_centers', {
        eq: { user_id: currentUser.id },
        order: { column: 'name', asc: true }
      });
      renderList();
    } catch (e) {
      console.error("Erro ao carregar dados:", e);
    }
  }

  function renderList() {
    const body = document.getElementById('listBody');
    if (!items.length) {
      body.innerHTML = '<div class="empty" style="padding: 40px; text-align: center; color: var(--muted);">Nenhum centro de custo cadastrado.</div>';
      return;
    }

    body.innerHTML = items.map(item => `
      <div class="row-item">
        <div style="display: flex; align-items: center; gap: 10px;">
          <div style="width: 10px; height: 10px; border-radius: 50%; background: ${item.color}"></div>
          <div>
            <div style="font-weight: 500;">${item.name}</div>
            <div style="font-size: 11px; color: var(--muted);">${item.code || '--'}</div>
          </div>
        </div>
        <div><span class="badge-${item.type}" style="padding: 4px 8px; border-radius: 6px; font-size: 11px;">${item.type}</span></div>
        <div style="font-size: 13px;">${item.is_active ? '✅ Ativo' : '❌ Inativo'}</div>
        <div style="font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${item.description || ''}</div>
        <div style="text-align: right; display: flex; gap: 8px; justify-content: flex-end;">
          <button class="btn btn-ghost btn-sm" onclick="editItem('${item.id}')">✏️</button>
          <button class="btn btn-ghost btn-sm" onclick="deleteItem('${item.id}', '${item.name}')" style="color:var(--danger)">🗑️</button>
        </div>
      </div>
    `).join('');
  }

  window.openModal = (item = null) => {
    editingId = item?.id || null;
    document.getElementById('modalTitle').textContent = item ? 'Editar Centro' : 'Novo Centro de Custo';
    document.getElementById('fName').value = item?.name || '';
    document.getElementById('fCode').value = item?.code || '';
    document.getElementById('fDescription').value = item?.description || '';
    document.getElementById('fType').value = item?.type || 'personal';
    document.getElementById('fActive').value = item ? String(item.is_active) : 'true';
    document.getElementById('fColor').value = item?.color || '#06b6d4';
    document.getElementById('modalOverlay').classList.add('open');
  };

  window.closeModal = () => document.getElementById('modalOverlay').classList.remove('open');

  window.editItem = (id) => {
    const item = items.find(i => i.id === id);
    if (item) openModal(item);
  };

  window.saveCostCenter = async () => {
    const payload = {
      name: document.getElementById('fName').value,
      code: document.getElementById('fCode').value,
      description: document.getElementById('fDescription').value,
      type: document.getElementById('fType').value,
      is_active: document.getElementById('fActive').value === 'true',
      color: document.getElementById('fColor').value,
      user_id: currentUser.id,
      updated_at: new Date().toISOString()
    };

    try {
      if (editingId) {
        await db.update('cost_centers', payload, editingId);
      } else {
        await db.insert('cost_centers', payload);
      }
      closeModal();
      loadData();
    } catch (e) { alert(e.message); }
  };

  window.deleteItem = async (id, name) => {
    if (!confirm(`Deseja realmente excluir o centro de custo "${name}"?`)) return;
    try {
      await db.delete('cost_centers', id);
      loadData();
    } catch (e) { alert('Erro ao excluir: ' + e.message); }
  };

  (async () => {
    initSupabase();
    currentUser = await getCurrentUser();
    if (!currentUser) {
      window.location.href = '/public/login.html';
      return;
    }
    loadData();
  })();
</script>
</body>
</html>
