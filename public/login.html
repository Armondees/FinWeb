<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - FinWeb</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #020617;
      --card:     #0f172a;
      --border:   #1e293b;
      --text:     #e2e8f0;
      --muted:    #94a3b8;
      --green:    #22c55e;
      --cyan:     #06b6d4;
      --danger:   #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    body {
      height: 100vh;
      display: flex;
      background: radial-gradient(circle at top left, #0f172a, #020617);
      color: var(--text);
    }

    .container { display: flex; width: 100%; }

    /* LEFT */
    .left {
      width: 45%;
      padding: 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .logo {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 40px;
    }
    .logo span { color: var(--green); }

    h1 { font-size: 26px; margin-bottom: 6px; }
    .subtitle { color: var(--muted); margin-bottom: 32px; font-size: 14px; }

    .input-group {
      position: relative;
      margin-bottom: 16px;
    }
    .input-group input {
      width: 100%;
      padding: 13px 13px 13px 40px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      outline: none;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    .input-group input:focus { border-color: var(--green); }
    .input-group .icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: var(--muted);
    }

    .options {
      display: flex;
      justify-content: flex-end;
      font-size: 13px;
      margin-bottom: 20px;
    }
    .options a { color: var(--cyan); text-decoration: none; }

    .btn {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, var(--green), var(--cyan));
      color: white;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .signup {
      margin-top: 24px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }
    .signup a { color: var(--green); text-decoration: none; }

    /* RIGHT */
    .right {
      width: 55%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #0c2a1a, #020617);
    }

    .visual {
      text-align: center;
    }
    .visual .icon-big { font-size: 72px; margin-bottom: 20px; }
    .visual h2 { font-size: 22px; margin-bottom: 8px; }
    .visual p { color: var(--muted); font-size: 14px; max-width: 260px; line-height: 1.6; }

    .tag {
      display: inline-block;
      margin-top: 24px;
      padding: 6px 14px;
      border-radius: 20px;
      background: rgba(34,197,94,0.1);
      color: var(--green);
      font-size: 12px;
      border: 1px solid rgba(34,197,94,0.2);
    }

    @media (max-width: 768px) {
      .right { display: none; }
      .left { width: 100%; padding: 40px 24px; }
    }
    /* --- NOVOS ESTILOS PARA LISTA EXPANSÍVEL --- */
    .categories-list {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-top: 10px;
    }

    .list-header {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 120px;
      padding: 14px 20px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .cat-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 120px;
      align-items: center;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }

    .cat-row:hover { background: rgba(255,255,255,0.01); }

    /* Estilo para Categoria Pai que pode ser clicada */
    .parent-row { cursor: pointer; }

    /* Estilo para Subcategorias com recuo e esconder/mostrar */
    .cat-row.sub-row {
      background: rgba(0,0,0,0.15);
      padding-left: 45px; 
      border-bottom: 1px solid rgba(30, 41, 59, 0.4);
    }

    .cat-row.sub-row.hidden {
      display: none;
    }

    .cat-info { display: flex; align-items: center; gap: 10px; }
    .cat-name { font-size: 14px; font-weight: 500; }

    /* Ícone de Expansão (Seta) */
    .expand-icon {
      font-size: 10px;
      color: var(--muted);
      width: 15px;
      transition: transform 0.2s;
    }
    .expanded .expand-icon {
      transform: rotate(90deg);
      color: var(--green);
    }

    .cat-actions { display: flex; gap: 8px; justify-content: flex-end; }

    .add-sub-inline {
      color: var(--cyan);
      background: transparent;
      border: none;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-left: 5px;
      line-height: 1;
    }
    .add-sub-inline:hover { color: var(--green); 
    }
  </style>
</head>
<body>
<div class="container">

  <!-- LEFT -->
  <div class="left">
    <div class="logo">Fin<span>Web</span></div>

    <h1>Bem-vindo de volta</h1>
    <p class="subtitle">Entre com suas credenciais para acessar o sistema</p>

    <div class="input-group">
      <span class="icon">📧</span>
      <input type="email" id="email" placeholder="E-mail" required>
    </div>

    <div class="input-group">
      <span class="icon">🔒</span>
      <input type="password" id="password" placeholder="Senha" required>
    </div>

    <div class="options">
      <a href="#">Esqueci minha senha</a>
    </div>

    <button class="btn" id="btnLogin">Entrar</button>

    <p class="signup">Não tem conta? <a href="/public/signup.html">Criar conta</a></p>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="visual">
      <div class="icon-big">💰</div>
      <h2>Controle financeiro completo</h2>
      <p>Gerencie contas, transações, cartões e relatórios em um só lugar.</p>
      <span class="tag">✦ Seguro com Supabase RLS</span>
    </div>
  </div>

</div>

<script type="module">
  import { initSupabase } from '../src/js/utils/db.js';
  import { loginUser } from '../src/js/modules/auth.js';

  initSupabase();

  document.getElementById('btnLogin').addEventListener('click', async () => {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('btnLogin');

    if (!email || !password) return alert('Preencha email e senha.');

    btn.disabled    = true;
    btn.textContent = 'Entrando...';

    try {
      await loginUser(email, password);
      window.location.href = '/public/dashboard.html';
    } catch (error) {
      alert(error.message);
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Entrar';
    }
  });

  // Permite login com Enter
  document.getElementById('password').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('btnLogin').click();
  });
</script>
</body>
</html>
