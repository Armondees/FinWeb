<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir Senha - FinWeb</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#020617; --card:#0f172a; --border:#1e293b; --text:#e2e8f0; --muted:#94a3b8; --green:#22c55e; --cyan:#06b6d4; --danger:#ef4444; }
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
    body { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; background:radial-gradient(circle at top left,#0f172a,#020617); color:var(--text); }
    .card { width:100%; max-width:430px; background:rgba(15,23,42,.92); border:1px solid var(--border); border-radius:18px; padding:30px; box-shadow:0 20px 60px rgba(0,0,0,.32); }
    .logo { font-size:24px; font-weight:600; margin-bottom:26px; } .logo span{ color:var(--green); }
    h1 { font-size:22px; margin-bottom:8px; } p { color:var(--muted); font-size:13px; line-height:1.55; margin-bottom:22px; }
    .input-group { position:relative; margin-bottom:14px; }
    .input-group input { width:100%; padding:13px 13px 13px 40px; border-radius:10px; border:1px solid var(--border); background:var(--bg); color:var(--text); outline:none; font-size:14px; }
    .input-group input:focus { border-color:var(--green); box-shadow:0 0 0 3px rgba(34,197,94,.12); }
    .icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:14px; }
    .btn { width:100%; padding:13px; border-radius:10px; border:none; background:linear-gradient(90deg,var(--green),var(--cyan)); color:white; font-weight:600; font-size:15px; cursor:pointer; margin-top:6px; }
    .btn:disabled { opacity:.5; cursor:not-allowed; }
    .message { display:none; margin-top:14px; padding:12px; border-radius:10px; font-size:13px; line-height:1.45; border:1px solid var(--border); background:rgba(2,6,23,.55); }
    .message.show { display:block; } .message.success{ border-color:rgba(34,197,94,.45); color:var(--green); } .message.error{ border-color:rgba(239,68,68,.45); color:var(--danger); }
    .back { display:block; text-align:center; margin-top:18px; color:var(--green); text-decoration:none; font-size:13px; }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">Fin<span>Web</span></div>
    <h1>Redefinir senha</h1>
    <p>Digite sua nova senha. Essa tela deve ser aberta pelo link enviado no e-mail de recuperação.</p>

    <div class="input-group">
      <span class="icon">🔒</span>
      <input type="password" id="password" placeholder="Nova senha" autocomplete="new-password">
    </div>
    <div class="input-group">
      <span class="icon">🔑</span>
      <input type="password" id="confirm" placeholder="Confirmar nova senha" autocomplete="new-password">
    </div>

    <button class="btn" id="btnUpdate">Atualizar senha</button>
    <div class="message" id="message"></div>
    <a class="back" href="/public/login.html">Voltar para o login</a>
  </main>

<script type="module">
  import { initSupabase } from '../src/js/utils/db.js';

  const supabaseClient = initSupabase();

  function getSupabaseClient() {
    return supabaseClient || window.supabaseClient || window.supabase;
  }

  function showMessage(msg, type = 'success') {
    const el = document.getElementById('message');
    el.textContent = msg;
    el.className = `message ${type} show`;
  }

  async function hydrateRecoverySession() {
    const supabase = getSupabaseClient();
    if (!supabase?.auth) return;

    const hash = new URLSearchParams(window.location.hash.replace('#', ''));
    const access_token = hash.get('access_token');
    const refresh_token = hash.get('refresh_token');

    if (access_token && refresh_token && supabase.auth.setSession) {
      const { error } = await supabase.auth.setSession({ access_token, refresh_token });
      if (error) throw error;
      history.replaceState(null, document.title, window.location.pathname);
    }
  }

  hydrateRecoverySession().catch(err => {
    showMessage('❌ Link inválido ou expirado. Solicite uma nova recuperação de senha.', 'error');
    console.error(err);
  });

  document.getElementById('btnUpdate').addEventListener('click', async () => {
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    const btn = document.getElementById('btnUpdate');
    const supabase = getSupabaseClient();

    if (!password || password.length < 6) return showMessage('A senha deve ter pelo menos 6 caracteres.', 'error');
    if (password !== confirm) return showMessage('As senhas não conferem.', 'error');
    if (!supabase?.auth) return showMessage('Cliente Supabase não inicializado. Verifique o arquivo db.js.', 'error');

    btn.disabled = true;
    btn.textContent = 'Atualizando...';

    try {
      let result;
      if (supabase.auth.updateUser) {
        result = await supabase.auth.updateUser({ password });
      } else if (supabase.auth.update) {
        result = await supabase.auth.update({ password });
      } else {
        throw new Error('Método de atualização de senha não encontrado no cliente Supabase.');
      }

      if (result?.error) throw result.error;
      showMessage('✅ Senha atualizada com sucesso. Você já pode voltar ao login.', 'success');
      setTimeout(() => { window.location.href = '/public/login.html'; }, 1800);
    } catch (error) {
      showMessage('❌ ' + (error.message || 'Erro ao atualizar senha.'), 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Atualizar senha';
    }
  });

  document.getElementById('confirm').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') document.getElementById('btnUpdate').click();
  });
</script>
</body>
</html>
