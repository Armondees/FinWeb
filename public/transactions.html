<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transações - FinWeb</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* PADRÃO ORIGINAL DASHBOARD_2.HTML[cite: 1] */
    :root {
      --bg:     #020617;
      --card:   #0f172a;
      --border: #1e293b;
      --text:   #e2e8f0;
      --muted:  #94a3b8;
      --green:  #22c55e;
      --cyan:   #06b6d4;
      --danger: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    body {
      display: flex;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* SIDEBAR PADRÃO[cite: 1] */
    .sidebar {
      width: 220px;
      height: 100vh;
      position: sticky;
      top: 0;
      background: var(--card);
      border-right: 1px solid var(--border);
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
    }

    .logo {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 32px;
      padding: 0 8px;
    }
    .logo span { color: var(--green); }

    .menu { flex: 1; }
    .menu a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      margin-bottom: 4px;
      border-radius: 8px;
      text-decoration: none;
      color: var(--muted);
      font-size: 14px;
      transition: all 0.15s;
      cursor: pointer;
    }
    .menu a:hover, .menu a.active {
      background: rgba(34,197,94,0.1);
      color: var(--green);
    }
    .menu a.danger:hover {
      background: rgba(239,68,68,0.1);
      color: var(--danger);
    }

    .menu-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      padding: 12px 12px 6px;
      font-weight: 600;
      opacity: 0.7;
      display: block;
    }

    .menu-divider {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 10px 12px;
      opacity: 0.5;
    }

    /* MAIN[cite: 1] */
    .main {
      flex: 1;
      padding: 28px 32px;
      overflow-y: auto;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .page-header h2 { font-size: 20px; font-weight: 600; }

    /* TABELA DE TRANSAÇÕES[cite: 2] */
    .t-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
    .t-table th { text-align: left; padding: 16px; background: rgba(255,255,255,0.02); color: var(--muted); font-size: 11px; text-transform: uppercase; }
    .t-table td { padding: 16px; border-top: 1px solid var(--border); font-size: 14px; }
    
    .val-income { color: var(--green); font-weight: 500; }
    .val-expense { color: var(--danger); font-weight: 500; }
    
    /* MODAL E FORMS[cite: 2] */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--card); padding: 28px; border-radius: 16px; width: 100%; max-width: 500px; border: 1px solid var(--border); }
    
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    label { font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; display: block; }
    input, select { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); color: white; border-radius: 8px; font-size: 14px; }
    
    .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 500; transition: 0.2s; }
    .btn-primary { background: var(--green); color: white; }
    .btn-primary:hover { opacity: 0.9; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

<!-- SIDEBAR PADRÃO[cite: 1] -->
<div class="sidebar">
  <div class="logo">Fin<span>Web</span></div>

  <nav class="menu">
    <div class="menu-label">Movimentações</div>
    <a href="/public/dashboard.html" id="link-dash">📊 Dashboard</a>
    <a href="/public/transactions.html" id="link-tx" class="active">💸 Transações</a>
    <a href="/public/cards.html">💳 Cartões</a>
    
    <hr class="menu-divider">

    <div class="menu-label">Demonstrativos</div>
    <a href="/public/reports.html">📈 Relatórios</a>
    <a href="#">🌊 Fluxo de Caixa</a>
    
    <hr class="menu-divider">

    <div class="menu-label">Cadastro</div>
    <a href="/public/accounts.html">🏦 Contas</a>
    <a href="/public/categories.html">🏷️ Categorias</a>
    <a href="/public/cost_centers.html">🏢 Centro de Custos</a>
    <a href="/public/Tags.html">🏷️ Tags</a>

    <hr class="menu-divider">
    <a onclick="logout()" class="danger" style="cursor:pointer">🚪 Sair</a>
  </nav>
</div>

<div class="main">
  <div class="page-header">
    <h2>💸 Movimentações</h2>
    <button class="btn btn-primary" onclick="openModal()">+ Nova Transação</button>
  </div>

  <table class="t-table">
    <thead>
      <tr>
        <th>Data</th>
        <th>Descrição</th>
        <th>Categoria</th>
        <th>Conta</th>
        <th>Valor</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="txList">
      <!-- Carregado via JS[cite: 2] -->
    </tbody>
  </table>
</div>

<!-- MODAL[cite: 2] -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 style="margin-bottom: 20px;">Nova Transação</h3>
    <form id="txForm">
      <div class="form-row">
        <div>
          <label>Tipo</label>
          <select id="type">
            <option value="expense">Despesa</option>
            <option value="income">Receita</option>
          </select>
        </div>
        <div>
          <label>Data</label>
          <input type="date" id="date">
        </div>
      </div>
      
      <div style="margin-bottom:16px;">
        <label>Descrição</label>
        <input type="text" id="description" placeholder="Ex: Aluguel, Supermercado...">
      </div>

      <div class="form-row">
        <div>
          <label>Valor</label>
          <input type="number" step="0.01" id="amount" placeholder="0,00">
        </div>
        <div>
          <label>Conta</label>
          <select id="account_id"></select>
        </div>
      </div>

      <div class="form-row">
        <div>
          <label>Categoria</label>
          <select id="category_id"></select>
        </div>
        <div>
          <label>Centro de Custo</label>
          <select id="cost_center_id"></select>
        </div>
      </div>

      <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:24px;">
        <button type="button" class="btn" style="background:#334155; color: white;" onclick="closeModal()">Cancelar</button>
        <button type="submit" class="btn btn-primary">Salvar Transação</button>
      </div>
    </form>
  </div>
</div>

<script type="module">
  import { initSupabase, getCurrentUser, db } from '../src/js/utils/db.js';
  import { logoutUser } from '../src/js/modules/auth.js'; // CORREÇÃO DO LOGOUT[cite: 1]
  import { format } from '../src/js/utils/format.js';

  let user = null;

  // FUNÇÃO DE SAIR (LOGOUT)[cite: 1]
  window.logout = async () => {
    try { 
      await logoutUser(); 
    } catch (e) { 
      alert("Erro ao sair: " + e.message); 
    }
  };

  async function loadOptions() {
    const [accs, cats, costs] = await Promise.all([
      db.select('accounts', { eq: { user_id: user.id } }),
      db.select('categories', { eq: { user_id: user.id } }),
      db.select('cost_centers', { eq: { user_id: user.id } })
    ]);

    fillSelect('account_id', accs);
    fillSelect('category_id', cats);
    fillSelect('cost_center_id', costs, "Nenhum");
  }

  function fillSelect(id, list, emptyLabel = null) {
    const el = document.getElementById(id);
    let html = emptyLabel ? `<option value="">${emptyLabel}</option>` : '';
    html += list.map(i => `<option value="${i.id}">${i.name}</option>`).join('');
    el.innerHTML = html;
  }
// 1. Busca os dados no Supabase
async function loadTransactions() {
  try {
    const txs = await db.select('transactions', { 
      eq: { user_id: user.id },
      order: { column: 'data', asc: false } // Usando sua coluna 'data'
    });
    
    renderTransactions(txs);
  } catch (error) {
    console.error("Erro ao carregar:", error);
  }
}

// 2. Nova função para Renderizar na Tabela
function renderTransactions(txs) {
  const tbody = document.getElementById('txList');
  
  tbody.innerHTML = txs.map(t => `
    <tr>
      <td>${t.data ? new Date(t.data).toLocaleDateString('pt-BR') : '---'}</td>
      <td>${t.descricao || '---'}</td>
      <td>${t.category_id || '---'}</td>
      <td>${t.account_id || '---'}</td>
      <td class="${t.tipo === 'income' ? 'val-income' : 'val-expense'}">
        ${format.money(t.amount || 0)} <!-- MUDADO DE t.valor PARA t.amount -->
      </td>
      <td>
        <button onclick="deleteTx('${t.id}')">🗑️</button>
      </td>
    </tr>
  `).join('');
}

// 3. Salva os dados usando os nomes exatos do seu Schema[cite: 2]
window.saveTransaction = async (e) => {
  e.preventDefault();
  
  // Captura o valor do input 'amount' e garante que seja um número
  const valorInput = document.getElementById('amount').value;
  const amountFloat = parseFloat(valorInput);

  const data = {
    user_id: user.id,
    descricao: document.getElementById('description').value, // campo 'descricao' no banco
    amount: amountFloat, // CHAVE CORRIGIDA PARA 'amount'
    tipo: document.getElementById('type').value,
    data: document.getElementById('date').value,
    account_id: document.getElementById('account_id').value,
    category_id: document.getElementById('category_id').value || null,
    cost_center_id: document.getElementById('cost_center_id').value || null,
    updated_at: new Date().toISOString()
  };

  try {
    const result = await db.insert('transactions', data);
    console.log("Inserido com sucesso:", result);
    closeModal();
    await loadTransactions(); 
  } catch (err) {
    console.error("Erro ao salvar:", err);
    alert("Falha ao salvar: " + err.message);
  }
};
  window.openModal = () => document.getElementById('modal').classList.add('open');
  window.closeModal = () => document.getElementById('modal').classList.remove('open');

  (async () => {
    try {
      initSupabase();
      user = await getCurrentUser();
      if (!user) return window.location.href = 'login.html';
      
      document.getElementById('txForm').onsubmit = saveTransaction;
      document.getElementById('date').valueAsDate = new Date();
      
      await loadOptions();
      await loadTransactions();
    } catch (error) {
      console.error("Erro na inicialização:", error);
    }
  })();
</script>
</body>
</html>
